name: Deploy proyectoGrado to GitHub Pages

# Triggers
on:
  push:
    branches: [main]
  workflow_dispatch: # Permite deploy manual

# Permissions para GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Cancelar workflows anteriores si hay push nuevo
concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  # Job 1: Build
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better branching experience

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  # Job 2: Deploy (solo corre después de build exitoso)
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5